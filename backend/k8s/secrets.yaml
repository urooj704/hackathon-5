# IMPORTANT: Do NOT commit real secrets. Use sealed-secrets or external-secrets operator.
# This file uses placeholder values — replace with actual secrets in production.
# Recommended: use `kubectl create secret generic fte-secrets --from-env-file=.env`

apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: customer-success-fte
type: Opaque
stringData:
  # AI API Keys
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"

  # Database
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  DATABASE_URL: "postgresql+asyncpg://fte_user:${POSTGRES_PASSWORD}@postgres.customer-success-fte.svc.cluster.local:5432/fte_db"
  DATABASE_URL_SYNC: "postgresql://fte_user:${POSTGRES_PASSWORD}@postgres.customer-success-fte.svc.cluster.local:5432/fte_db"

  # Gmail / Google Cloud
  GMAIL_CLIENT_ID: "${GMAIL_CLIENT_ID}"
  GMAIL_CLIENT_SECRET: "${GMAIL_CLIENT_SECRET}"
  GMAIL_REFRESH_TOKEN: "${GMAIL_REFRESH_TOKEN}"
  GMAIL_FROM_EMAIL: "${GMAIL_FROM_EMAIL}"
  GOOGLE_PUBSUB_TOPIC: "${GOOGLE_PUBSUB_TOPIC}"

  # WhatsApp / Meta Cloud API
  WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID}"
  WHATSAPP_ACCESS_TOKEN: "${WHATSAPP_ACCESS_TOKEN}"
  WHATSAPP_VERIFY_TOKEN: "${WHATSAPP_VERIFY_TOKEN}"

  # Web Form
  WEBFORM_SECRET_KEY: "${WEBFORM_SECRET_KEY}"
